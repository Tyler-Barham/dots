"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
prepend_keymap = [
    # Swap q/Q mappings with eachother
    { on = "q",             run = "quit --no-cwd-file", desc = "Quit without outputting cwd-file" },
    { on = "Q",             run = "quit",               desc = "Quit the process" },

    # Navigate preview with pgup/pgdown
    { on = "<PageUp>",      run = "seek -5",            desc = "Seek up 5 units in the preview" },
    { on = "<PageDown>",    run = "seek 5",             desc = "Seek up 5 units in the preview" },
]

