# Set term
set -g default-terminal "screen-256color"
set -sa terminal-features ',xterm*:RGB'
set -sa terminal-overrides ',xterm*:Tc'

# remap prefix
unbind C-b
set-option -g prefix M-w
bind M-w send-prefix

# For faster esc
set -sg escape-time 20
set -g repeat-time 200

set -g focus-events on

# Renumber remaining windows after deleting one
set-option -g renumber-windows on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Change focus
bind 'h' select-pane -L
bind 'j' select-pane -D
bind 'k' select-pane -U
bind 'l' select-pane -R

# Resize
bind -r -T prefix M-h resize-pane -L 5
bind -r -T prefix M-j resize-pane -D 5
bind -r -T prefix M-k resize-pane -U 5
bind -r -T prefix M-l resize-pane -R 5


# Split panes
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '%'
unbind '"'

bind -T root C-t run-shell 'tmux-toggleterm'

# Allow yanking to system clipboard
set -g mode-keys vi
set -g status-keys vi
bind ']' run-shell 'xclip -selection clipboard -out | tmux load-buffer -' \; paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind -T copy-mode-vi M-v send-keys -X halfpage-down
bind -T copy-mode-vi M-b send-keys -X halfpage-up

# reload config file (change file location to your the tmux.conf you want to use)
bind 'r' run-shell '\
if [ -f ~/.tmux.conf ]; then tmux source-file ~/.tmux.conf && tmux display-message "Reloaded ~/.tmux.conf"; fi;\
if [ -f ~/.config/tmux/tmux.conf ]; then tmux source-file ~/.config/tmux/tmux.conf && tmux display-message "Reloaded ~/.config/tmux/tmux.conf"; fi;\
'

# Increase from 2000
set-option -g history-limit 10000

# ----------------------
# Status Bar
# -----------------------
# set-option -g status on                # turn the status bar on
set -g status-interval 30               # set update frequencey (default 15 seconds)
set -g status-justify right
set-option -g status-position top    # position the status bar at top of screen

# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on

fg_1="#[fg=colour1]"
fg_2="#[fg=colour2]"
fg_3="#[fg=colour3]"
fg_56="#[fg=colour56]"
fg_74="#[fg=colour74]"
fg_198="#[fg=colour198]"

sq_op="${fg_198}["
sq_cl="${fg_198}]"

set -g status-left ""

# show resurrect last save
# set -g status-right-length 80
set -g status-right " ${sq_op}${fg_56}#(echo $(( ($(date +%%s) - $(date -r ~/.tmux/resurrect/last +%%s)) / 60 ))mins )${sq_cl}"

# set color for status bar
set -g status-style 'bg=default'

# set window list colors
set-window-option -g window-status-style 'fg=colour1 bg=default'
set-window-option -g window-status-current-style 'fg=colour2 bg=default'

# Only show the status bar if there's more than 1 window
# Function to update status based on window count
set-option -g @update-status \
    'SESSION=$(tmux display-message -p "#S"); \
    COUNT=$(tmux list-windows -t "$SESSION" 2>/dev/null | wc -l); \
    if [ "$COUNT" -gt 1 ]; then \
        tmux set-option -t "$SESSION" status on; \
    else \
        tmux set-option -t "$SESSION" status off; \
    fi'
# Initial status update when tmux starts
run-shell "tmux #{@update-status}"

# Automatically update status
set-hook -g after-new-window            "run-shell 'tmux #{@update-status}'"
set-hook -g after-kill-pane             "run-shell 'tmux #{@update-status}'"
set-hook -g window-linked               "run-shell 'tmux #{@update-status}'"
set-hook -g window-unlinked             "run-shell 'tmux #{@update-status}'"
set-hook -g after-new-session           "run-shell 'tmux #{@update-status}'"
set-hook -g client-session-changed      "run-shell 'tmux #{@update-status}'"

# divider color
set -g pane-border-style 'fg=color1 bg=default'
set -g pane-active-border-style 'fg=color2 bg=default'

# Active/inactive pane colors
# set -g window-style 'fg=color245 bg=default'
# set -g window-active-style 'fg=default bg=default'

# Plugin opions
set -g @resurrect-delete-backup-after '3'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
set -g @resurrect-processes 'false'

set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

bind -n M-f run -b "#{@fingers-cli} start #{pane_id}"

# set -g default-shell /usr/bin/zsh

